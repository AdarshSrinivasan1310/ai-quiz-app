services:
  # Backend: Django API
  - type: web
    name: quiz-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quiz-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: USE_SQLITE
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: GEMINI_API_KEY
        sync: false # Set this in the Render Dashboard

  # Frontend: Next.js
  - type: web
    name: quiz-frontend
    env: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: quiz-backend
          property: host
      # Note: We'll need to update NEXT_PUBLIC_API_URL to include https:// in the Render env directly

databases:
  - name: quiz-db
    plan: free # Use the free tier of Postgres
